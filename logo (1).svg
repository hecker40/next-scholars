<svg width="100%" viewBox="212 175 328 258" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NextScholar icon</title>
  <desc>A detailed modern graduation cap icon in purple gradient on a black background</desc>

  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bodyLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bodyRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bodyFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tasselStr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect x="212" y="175" width="328" height="258" rx="32" fill="#080808"/>

  <!-- Soft glow under cap -->
  <ellipse cx="340" cy="420" rx="180" ry="40" fill="url(#glow)"/>

  <!-- ── MORTARBOARD BOARD (isometric diamond) ── -->

  <!-- Left face of board thickness -->
  <polygon points="150,300  340,400  340,415  150,315" fill="url(#leftFace)"/>
  <!-- Right face of board thickness -->
  <polygon points="530,300  340,400  340,415  530,315" fill="url(#rightFace)"/>

  <!-- Top face (main diamond) -->
  <polygon points="340,185  530,300  340,415  150,300" fill="url(#topFace)"/>

  <!-- Shine on top -->
  <polygon points="340,185  530,300  340,415  150,300" fill="url(#shine)"/>

  <!-- Top face edge highlight -->
  <polygon points="340,185  530,300  340,415  150,300" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.5"/>

  <!-- Center crease lines on board -->
  <line x1="340" y1="185" x2="340" y2="415" stroke="#c4b5fd" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="300" x2="530" y2="300" stroke="#c4b5fd" stroke-width="1" opacity="0.15"/>

  <!-- ── CAP BODY (box under board) ── -->

  <!-- Left side of body -->
  <polygon points="284,415  284,490  340,510  340,435" fill="url(#bodyLeft)"/>
  <!-- Right side of body -->
  <polygon points="396,415  396,490  340,510  340,435" fill="url(#bodyRight)"/>
  <!-- Front face of body -->
  <polygon points="284,415  396,415  396,490  284,490" fill="url(#bodyFront)"/>

  <!-- Front face highlight top edge -->
  <line x1="284" y1="415" x2="396" y2="415" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>

  <!-- Bottom ellipse cap -->
  <ellipse cx="340" cy="490" rx="56" ry="10" fill="#2e1065"/>
  <ellipse cx="340" cy="490" rx="56" ry="10" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>

  <!-- ── TASSEL ── -->
  <!-- Button on center of board -->
  <circle cx="340" cy="300" r="10" fill="#6366f1"/>
  <circle cx="340" cy="300" r="10" fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
  <circle cx="340" cy="300" r="4" fill="#c4b5fd"/>

  <!-- String going left and down -->
  <path d="M340,300 Q260,300 240,370" fill="none" stroke="url(#tasselStr)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tassel knot -->
  <circle cx="240" cy="372" r="7" fill="#a855f7"/>
  <circle cx="240" cy="372" r="7" fill="none" stroke="#e879f9" stroke-width="1" opacity="0.6"/>

  <!-- Tassel fringe -->
  <line x1="230" y1="379" x2="222" y2="418" stroke="#e879f9" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="237" y1="379" x2="233" y2="420" stroke="#c026d3" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="244" y1="379" x2="244" y2="422" stroke="#a855f7" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="251" y1="379" x2="255" y2="420" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round"/>

</svg>
